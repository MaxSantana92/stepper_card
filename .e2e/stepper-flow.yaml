# E2E — Happy path del stepper (Maestro)
#
# Prerrequisitos:
# - Maestro CLI instalado: https://docs.maestro.dev/getting-started/installing-maestro
# - App compilada e instalada en emulador/dispositivo (mismo applicationId que abajo).
# - No depende de textos visibles: usa testID/id para ser robusto frente a i18n.
#
# Ejecutar desde la raíz del repo: pnpm test:e2e

appId: com.stepper_card
---
- launchApp
- extendedWaitUntil:
    visible:
      id: "step-renderer-step-1"
    timeout: 60000
- assertVisible:
    id: "navigation-controls-next"
- tapOn:
    id: "navigation-controls-next"
- assertVisible:
    id: "step-renderer-step-2"
- assertVisible:
    id: "app-root-card-picker"
- assertVisible:
    id: "app-root-card-dots"
# La primera tarjeta del mock queda auto-seleccionada al entrar al paso 2.
- tapOn:
    id: "navigation-controls-next"
- assertVisible:
    id: "step-renderer-step-3"
# StatusCard + toolbar de acciones: existencia en el paso final sin depender del idioma.
- assertVisible:
    id: "step-renderer-status"
- assertVisible:
    id: "card-status-actions"
